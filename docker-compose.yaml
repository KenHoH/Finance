services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  nestjs-app:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis 
      - REDIS_PORT=6379

  next-app:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - nestjs-app
    environnment:
      - BACKEND_URL=http://nestjs-app:3001